<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CropWiseX - Disease Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .container { max-width: 700px; margin: 60px auto; }
        .card { border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .btn-primary { background: #0d6efd; border: none; }
        .btn-primary:hover { background: #0b5ed7; }
        .emoji { font-size: 1.6em; margin-right: 8px; }
        #diseaseResult { min-height: 180px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card p-4">
            <h3 class="text-center mb-4">
                <span class="emoji">🌿</span> Crop Disease Detection
            </h3>
            <p class="text-center text-muted mb-4">
                Upload a clear close-up photo of the affected leaf. We will analyze it for common diseases and give treatment suggestions.
            </p>

            <form id="diseaseForm" enctype="multipart/form-data" class="text-center">
                <div class="mb-4">
                    <input type="file" id="diseaseImage" accept="image/*" required class="form-control form-control-lg">
                </div>
                <button type="button" onclick="detectDisease()" class="btn btn-primary btn-lg px-5">
                    Analyze Leaf
                </button>
            </form>

            <div id="diseaseResult" class="mt-5 p-4 bg-light border rounded" style="display: none;">
                <h5 class="text-center mb-3">Analysis Result</h5>
                <p id="diseaseOutput" class="text-center mb-0"></p>
            </div>

            <div class="text-center mt-4">
                <a href="/dashboard" class="btn btn-outline-secondary">Back to Home</a>
            </div>
        </div>
    </div>

    <script>
    async function detectDisease() {
      const fileInput = document.getElementById('diseaseImage');
      const resultDiv = document.getElementById('diseaseResult');
      const outputP = document.getElementById('diseaseOutput');

      if (!fileInput.files || fileInput.files.length === 0) {
        outputP.innerHTML = '<span style="color: red;">Please select a leaf photo first.</span>';
        resultDiv.style.display = 'block';
        return;
      }

      const formData = new FormData();
      formData.append('image', fileInput.files[0]);

      try {
        outputP.innerHTML = '<span class="text-muted">Analyzing your photo... (5–10 seconds)</span>';
        resultDiv.style.display = 'block';

        const response = await fetch('/api/detect-disease', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (data.status === "success") {
          outputP.innerHTML = `
            <strong>Disease:</strong> ${data.disease}<br>
            <strong>Confidence:</strong> ${data.confidence}<br><br>
            <strong>What to do:</strong><br>
            ${data.recommendations.map(rec => `→ ${rec}`).join('<br>')}
          `;
          resultDiv.classList.add('border-success');
        } else {
          outputP.innerHTML = `<span style="color: red;">Error: ${data.message || "Could not analyze the image"}</span>`;
          resultDiv.classList.add('border-danger');
        }
      } catch (error) {
        outputP.innerHTML = '<span style="color: red;">Failed to connect to server. Try again.</span>';
        console.error(error);
      }
    }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
