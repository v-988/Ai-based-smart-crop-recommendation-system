<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop Disease Detection</title>

<style>
body{font-family:Arial;background:#f4f6f8;margin:0}
.page{display:none;min-height:100vh;justify-content:center;align-items:center}
.page.active{display:flex}
.container{background:#fff;padding:30px;border-radius:10px;width:350px;box-shadow:0 0 10px #ccc}
h2{text-align:center}
input,button{width:100%;padding:10px;margin:8px 0}
button{background:#198754;color:#fff;border:none;cursor:pointer}
.link{text-align:center;color:#198754;cursor:pointer}
#messageBox{display:none;padding:10px;margin-bottom:10px;border-radius:5px;
background:#e8f5e9;color:#198754;text-align:center;font-weight:bold}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="page active">
<div class="container">

<div id="loginMessage" class="messageBox"></div>

<h2>Login</h2>
<form onsubmit="handleLogin(event)" autocomplete="off">
<input type="email" id="loginEmail" placeholder="Email" autocomplete="new-email" required>
<input type="password" id="loginPassword" placeholder="Password" autocomplete="new-password" required>
<button type="submit">Login</button>
</form>

<div class="link" onclick="showPage('signupPage')">Sign Up</div>
</div>
</div>

<!-- SIGNUP PAGE -->
<div id="signupPage" class="page">
<div class="container">

<div id="signupMessage" class="messageBox"></div>

<h2>Sign Up</h2>
<form onsubmit="handleSignup(event)" autocomplete="off">

<input type="text" id="signupName" placeholder="First Name" required>
<input type="email" id="signupEmail" placeholder="Email" autocomplete="new-email" required>
<input type="password" id="signupPassword" placeholder="Password" autocomplete="new-password" required>
<input type="password" id="confirmPassword" placeholder="Confirm Password" required>

<button type="submit">Create Account</button>
</form>

<div class="link" onclick="showPage('loginPage')">Back to Login</div>
</div>
</div>

<script>
function showPage(pageId){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(pageId).classList.add('active');
clearInputs();
}

function clearInputs(){
document.querySelectorAll("input").forEach(i => i.value = "");
}

function showMessage(id, text){
const box = document.getElementById(id);
box.innerText = text;
box.style.display = "block";
setTimeout(() => box.style.display = "none", 2000);
}

function handleLogin(e){
e.preventDefault();

const email = loginEmail.value;
const pass = loginPassword.value;

if(email && pass){
showMessage("loginMessage","Login successful ✅");
setTimeout(()=>window.location.href="/dashboard",1500);
}
}

function handleSignup(e){
e.preventDefault();

if(signupPassword.value !== confirmPassword.value){
alert("Passwords do not match!");
return;
}

showMessage("signupMessage","Account created successfully ✅");
setTimeout(()=>window.location.href="/dashboard",1500);
}

window.onload = clearInputs;
</script>

</body>
</html>
