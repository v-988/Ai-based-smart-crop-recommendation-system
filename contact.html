<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feature 1 – Contact Support Popup</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── DEMO BODY (remove in your main page) ── */
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f3f4f6;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
    }

    /* ════════════════════════════════════════
       PASTE EVERYTHING BELOW INTO YOUR CSS
    ════════════════════════════════════════ */

    /* ── TRIGGER BUTTON (style to match your existing button) ── */
    .contact-btn {
      display: flex; align-items: center; gap: 8px;
      background: none; border: none;
      color: #6d28d9; font-size: 15px; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; padding: 8px 12px; border-radius: 8px;
      transition: background 0.2s;
    }
    .contact-btn:hover { background: #f5f3ff; }
    .contact-btn svg { width: 18px; height: 18px; }

    /* ── OVERLAY ── */
    .cs-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      z-index: 9998;
      animation: fadeIn 0.2s ease;
    }
    .cs-overlay.open { display: block; }

    /* ── POPUP ── */
    .cs-popup {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      width: 92%; max-width: 420px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.2);
      z-index: 9999;
      overflow: hidden;
      animation: popUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .cs-popup.open { display: block; }

    @keyframes popUp {
      from { opacity:0; transform: translate(-50%, -45%) scale(0.9); }
      to   { opacity:1; transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes fadeIn {
      from { opacity:0; } to { opacity:1; }
    }

    /* ── POPUP HEADER ── */
    .cs-header {
      background: linear-gradient(135deg, #166534, #22c55e);
      padding: 24px 24px 20px;
      position: relative;
    }
    .cs-header h2 {
      color: #fff; font-size: 18px; font-weight: 600; margin: 0 0 4px;
    }
    .cs-header p { color: rgba(255,255,255,0.75); font-size: 13px; margin: 0; }
    .cs-close {
      position: absolute; top: 14px; right: 14px;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: none;
      color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .cs-close:hover { background: rgba(255,255,255,0.35); }

    /* ── POPUP BODY ── */
    .cs-body { padding: 20px 24px 24px; }

    .cs-section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: #9ca3af; margin-bottom: 10px;
    }

    /* ── CONTACT CARDS ── */
    .cs-card {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1.5px solid #f0f0f0;
      margin-bottom: 10px;
      text-decoration: none;
      transition: all 0.2s;
      background: #fafafa;
    }
    .cs-card:hover { border-color: #bbf7d0; background: #f0fdf4; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(34,197,94,0.12); }

    .cs-card-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .cs-card-icon.whatsapp { background: #dcfce7; }
    .cs-card-icon.phone    { background: #dbeafe; }
    .cs-card-icon.email    { background: #fef3c7; }

    .cs-card-info { flex: 1; }
    .cs-card-info .cs-card-title {
      font-size: 14px; font-weight: 600; color: #111;
    }
    .cs-card-info .cs-card-sub {
      font-size: 12px; color: #6b7280; margin-top: 2px;
    }
    .cs-card-arrow { color: #d1d5db; font-size: 14px; }

    /* WhatsApp action button */
    .cs-wa-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #25d366, #128c7e);
      border: none; border-radius: 12px;
      color: #fff; font-size: 14px; font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; margin-top: 14px;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(37,211,102,0.35);
    }
    .cs-wa-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,211,102,0.4); }

    .cs-hours {
      display: flex; align-items: center; gap: 8px;
      background: #f9fafb; border-radius: 10px;
      padding: 11px 14px; margin-top: 12px;
      font-size: 12px; color: #6b7280;
    }
    .cs-hours .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
      50%      { box-shadow: 0 0 0 6px rgba(34,197,94,0.08); }
    }
  </style>
</head>
<body>

  <!-- ══ YOUR EXISTING BUTTON — adapt the class/onclick to match yours ══ -->
  <button class="contact-btn" onclick="openContactSupport()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    Contact Support
  </button>

  <!-- ════════════════════════════════════════
       PASTE THE MARKUP BELOW BEFORE </body>
  ════════════════════════════════════════ -->

  <!-- OVERLAY -->
  <div class="cs-overlay" id="csOverlay" onclick="closeContactSupport()"></div>

  <!-- POPUP -->
  <div class="cs-popup" id="csPopup">
    <div class="cs-header">
      <h2>🌾 Contact Support</h2>
      <p>We're here to help farmers. Reach us anytime.</p>
      <button class="cs-close" onclick="closeContactSupport()">✕</button>
    </div>

    <div class="cs-body">
      <div class="cs-section-label">📞 Phone &amp; WhatsApp</div>

      <!-- Card 1: WhatsApp Primary -->
      <a class="cs-card" href="https://wa.me/919876543210" target="_blank">
        <div class="cs-card-icon whatsapp">💬</div>
        <div class="cs-card-info">
          <div class="cs-card-title">WhatsApp Support</div>
          <div class="cs-card-sub">+91 98765 43210 — Tap to chat</div>
        </div>
        <span class="cs-card-arrow">›</span>
      </a>

      <!-- Card 2: Helpline -->
      <a class="cs-card" href="tel:+911800123456">
        <div class="cs-card-icon phone">📞</div>
        <div class="cs-card-info">
          <div class="cs-card-title">Farmer Helpline</div>
          <div class="cs-card-sub">1800-123-456 — Toll Free</div>
        </div>
        <span class="cs-card-arrow">›</span>
      </a>

      <!-- Card 3: Email -->
      <a class="cs-card" href="mailto:support@agrosense.in">
        <div class="cs-card-icon email">✉️</div>
        <div class="cs-card-info">
          <div class="cs-card-title">Email Us</div>
          <div class="cs-card-sub">support@agrosense.in</div>
        </div>
        <span class="cs-card-arrow">›</span>
      </a>

      <!-- Big WhatsApp CTA -->
      <a class="cs-wa-btn" href="https://wa.me/919876543210?text=Hello%2C%20I%20need%20farming%20support" target="_blank">
        <span>💬</span> Chat on WhatsApp Now
      </a>

      <!-- Hours -->
      <div class="cs-hours">
        <div class="dot"></div>
        <span><strong>Support Hours:</strong>&nbsp; Mon – Sat, 8:00 AM – 8:00 PM IST</span>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       PASTE THE JS BELOW (or in your script)
  ════════════════════════════════════════ -->
  <script>
    function openContactSupport() {
      document.getElementById('csPopup').classList.add('open');
      document.getElementById('csOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeContactSupport() {
      document.getElementById('csPopup').classList.remove('open');
      document.getElementById('csOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }
    // Close on Escape key
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeContactSupport();
    });
  </script>

</body>
</html>
