services:
  # Define a Web Service for CropWise-X
  - type: web
    name: crop-wise-x
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.2
      # Ensure Render allows background jobs to finish
      - key: WEB_CONCURRENCY
        value: 2
